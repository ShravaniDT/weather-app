<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="card">

        <!-- Search Box -->
        <div class="search">
            <input type="text" placeholder="Enter city name" spellcheck="false">
            <button>
                <img src="images/images/search.png" alt="Search">
            </button>
        </div>

        <!-- Error Message -->
        <div class="error">
            <p>Invalid city name</p>
        </div>

        <!-- Weather Details -->
        <div class="weather">

            <img src="images/images/rain.png" class="weather-icon">

            <h1 class="temp">22°C</h1>
            <h2 class="city">New York</h2>

            <div class="details">

                <div class="col">
                    <img src="images/images/humidity.png" alt="Humidity">
                    <div>
                        <p class="humidity">50%</p>
                        <p>Humidity</p>
                    </div>
                </div>

                <div class="col">
                    <img src="images/images/wind.png" alt="Wind">
                    <div>
                        <p class="wind">15 km/h</p>
                        <p>Wind Speed</p>
                    </div>
                </div>

            </div>

        </div>

    </div>

    <script>
        const apikey = "ddfd4d8ebfe185573371eb1515aec6a7";
        const apiUrl = "https://api.openweathermap.org/data/2.5/weather?units=metric&q=";

        const searchBox = document.querySelector(".search input");
        const searchButton = document.querySelector(".search button");

        async function checkWeather(city) {

            const response = await fetch(apiUrl + city + `&appid=${apikey}`);
            const data = await response.json();

            if (response.status == 404) {
                document.querySelector(".error").style.display = "block";
                document.querySelector(".weather").style.display = "none";
            } else {

                document.querySelector(".city").innerHTML = data.name;
                document.querySelector(".temp").innerHTML = Math.round(data.main.temp) + "°C";
                document.querySelector(".humidity").innerHTML = data.main.humidity + "%";
                document.querySelector(".wind").innerHTML = data.wind.speed + " km/h";

                if (data.weather[0].main == "Clouds") {
                    document.querySelector(".weather-icon").src = "images/images/clouds.png";
                } else if (data.weather[0].main == "Clear") {
                    document.querySelector(".weather-icon").src = "images/images/clear.png";
                } else if (data.weather[0].main == "Rain") {
                    document.querySelector(".weather-icon").src = "images/images/rain.png";
                } else if (data.weather[0].main == "Drizzle") {
                    document.querySelector(".weather-icon").src = "images/images/drizzle.png";
                } else if (data.weather[0].main == "Mist") {
                    document.querySelector(".weather-icon").src = "images/images/mist.png";
                }

                document.querySelector(".error").style.display = "none";
                document.querySelector(".weather").style.display = "block";
            }
        }

        searchButton.addEventListener("click", () => {
            checkWeather(searchBox.value);
        });
    </script>

</body>
</html>
